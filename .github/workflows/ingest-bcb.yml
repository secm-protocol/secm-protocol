# First live RFC-0014 pipeline (RFC-0020): the protocol feeds itself.
# The same scheduled-automation mechanism used to post outward, pointed inward.
name: Ingest BCB indicators

on:
  schedule:
    - cron: "0 9 * * *"   # daily, 09:00 UTC (~06:00 BRT)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run ingestion (validation gate included)
        working-directory: implementation
        env:
          PYTHONPATH: src
        run: python -m secm.ingestion.bcb
      - name: Commit validated units
        run: |
          git config user.name "secm-ingestion"
          git config user.email "ingestion@secm-protocol.invalid"
          git add data/environment/
          git diff --cached --quiet || git commit -m "Ingestion: BCB daily indicators (RFC-0020 pipeline)"
          git push
